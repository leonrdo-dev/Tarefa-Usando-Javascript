<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro de Tarefas</title>
  <link rel="stylesheet" href="style.css" />
</head>


<body>

  <main class="container">
    <h1>Cadastro de Tarefas com input</h1>


    <form id="formulario">
      <input id="tarefa" type="text" placeholder="Digite sua tarefa" />
      <button type="submit">Adicionar</button>
    </form>


    <h3>Eis a lista</h3>
    <p>Total de tarefas: <span id="contador">0</span></p>


    <p id="mensagem"></p>


    <ul id="lista">

    </ul>

  </main>




  <script src="script2.js"></script> <!--chamando o script-->

</body>

</html>
